name: liboqs-android CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'liboqs-android/**'
      - '.github/workflows/liboqs-android-ci.yml'

jobs:
  test:
    name: Instrumented Tests + Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        api-level: [ 31 ]
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests with coverage
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb uninstall io.github.oliverbajus.liboqs_android.test || true
            adb uninstall io.github.oliverbajus.liboqs_android || true
            ./gradlew :liboqs-android:createDebugCoverageReport

      - name: List coverage report files
        if: always()
        run: find liboqs-android/build/reports/coverage -type f 2>/dev/null || echo "No coverage directory found"

      - name: Generate coverage badge
        if: success()
        id: badge
        run: |
          # Parse coverage from JaCoCo XML report
          REPORT=$(find liboqs-android/build/reports/coverage -name "*.xml" -head -1 2>/dev/null || true)
          if [ -z "$REPORT" ]; then
            # Fallback: try to parse from HTML
            REPORT_HTML=$(find liboqs-android/build/reports/coverage -name "index.html" -head -1 2>/dev/null || true)
            echo "No XML report found. HTML: $REPORT_HTML"
            echo "coverage=unknown" >> "$GITHUB_OUTPUT"
          else
            # Extract instruction coverage from JaCoCo XML
            MISSED=$(grep -oP 'type="INSTRUCTION" missed="\K[0-9]+' "$REPORT" | tail -1)
            COVERED=$(grep -oP 'type="INSTRUCTION"[^/]*covered="\K[0-9]+' "$REPORT" | tail -1)
            if [ -n "$MISSED" ] && [ -n "$COVERED" ]; then
              TOTAL=$((MISSED + COVERED))
              if [ "$TOTAL" -gt 0 ]; then
                PCT=$((COVERED * 100 / TOTAL))
              else
                PCT=0
              fi
              echo "coverage=$PCT" >> "$GITHUB_OUTPUT"
            else
              echo "coverage=unknown" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create and commit coverage badge
        if: success()
        run: |
          PCT="${{ steps.badge.outputs.coverage }}"
          if [ "$PCT" = "unknown" ]; then
            COLOR="lightgrey"
          elif [ "$PCT" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$PCT" -ge 60 ]; then
            COLOR="yellow"
          elif [ "$PCT" -ge 40 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi

          mkdir -p .github/badges
          # Download badge SVG from shields.io
          curl -s "https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}" -o .github/badges/coverage.svg

          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]"
          git push origin HEAD:${{ github.head_ref }} || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: liboqs-android/build/reports/coverage/androidTest/debug/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: liboqs-android/build/outputs/androidTest-results/connected/
